services:
  - type: web
    name: unilearn-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Server-side only: used by Next.js rewrite proxy to forward /api/* to backend.
      # Set this to your actual backend Render service URL (check Render dashboard).
      - key: API_URL
        value: https://virtual-learning-environment-backend.onrender.com
      # NEXT_PUBLIC_API_URL is no longer used as axios baseURL.
      # Axios uses empty baseURL; Next.js proxy rewrites /api/* to API_URL.
      - key: NEXT_PUBLIC_API_URL
        value: ''
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://virtual-learning-environment-backend.onrender.com
      - key: NODE_ENV
        value: production
